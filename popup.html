<div class="st-extension flex-container flexFlowColumn height100p" style="gap: 10px; background: transparent; border: none;">
    <div id="ssPopupHeader" style="margin-bottom: 10px;">
        <h3 style="margin-top: 0;">Review Scene Extraction</h3>
        <span class="help-text">Refine the AI's summary and extracted facts before they are persisted to your chat history and Data Bank.</span>
    </div>
    
    <div class="section" style="margin-bottom: 10px; padding: 12px;">
        <div class="control-group">
            <label class="block-label">Scene Title</label>
            <input id="ssPopupTitle" type="text" placeholder="Optional brief title..." />
        </div>
        <div class="control-group" style="margin-bottom: 0;">
            <label class="block-label">Scene Description</label>
            <textarea id="ssPopupDescription" rows="2" placeholder="Optional short description..."></textarea>
        </div>
    </div>
    
    <div class="section" style="margin-bottom: 10px; padding: 12px;">
        <div class="control-group" style="margin-bottom: 0;">
            <label class="block-label">Scene Summary</label>
            <textarea id="ssPopupTextarea" rows="6" style="min-height: 100px;"></textarea>
        </div>
    </div>

    <div class="section flex1 flexFlowColumn overflow-hidden" style="margin-bottom: 0; padding: 12px; display: flex; flex-direction: column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label class="block-label" style="margin:0;">Extracted Memory Blocks</label>
            <button id="ssPopupAddMemory" class="btn" style="font-size: 0.8em; padding: 2px 8px;">
                <i class="fa-solid fa-plus"></i> Add Block
            </button>
        </div>
        <div id="ssPopupMemoriesList" class="flex1 overflow-auto" style="border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; background: var(--bg-input); min-height: 150px;">
            <!-- Memory blocks go here -->
        </div>
        <span class="help-text" style="margin-top:8px;">Facts are grouped by encounter and stored in the Data Bank for Vector Storage retrieval.</span>
    </div>
</div>
